amcl:
  ros__parameters:
    use_sim_time: false
    
    alpha1: 0.4
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.4
    alpha5: 0.2

    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    global_frame_id: "map"

    scan_topic: /scan

    min_particles: 800
    max_particles: 2800
    max_beams: 120

    laser_model_type: "likelihood_field"
    laser_min_range: 0.3
    laser_max_range: 25.0
    laser_likelihood_max_dist: 2.0
    transform_tolerance: 0.3

    update_min_d: 0.03
    update_min_a: 0.02
    resample_interval: 1

    recovery_alpha_slow: 0.0
    recovery_alpha_fast: 0.0

    set_initial_pose: false


map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: "/home/i421/scout_ws/src/scout_navigation/maps/4floor.yaml"


planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 5.0

    planner_plugins:
      - GridBased

    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: true
      allow_unknown: true


controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0
    
    min_x_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.10

    progress_checker_plugin: "progress_checker"

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.05
      movement_time_allowance: 20.0

    goal_checker_plugins:
      - general_goal_checker

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
      stateful: True

    controller_plugins:
      - FollowPath

    FollowPath:
      plugin: "nav2_rotation_shim_controller::RotationShimController"

      primary_controller: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      angular_dist_threshold: 0.5
      forward_sampling_distance: 0.5
      rotate_to_heading_angular_vel: 0.35
      max_angular_accel: 2.0
      simulate_ahead_time: 1.0

      desired_linear_vel: 0.15

      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.5

      use_cost_regulated_linear_velocity_scaling: true
      cost_scaling_dist: 0.6
      cost_scaling_gain: 1.0
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.05

      lookahead_dist: 0.40
      min_lookahead_dist: 0.20
      max_lookahead_dist: 0.70
      lookahead_time: 1.0

      transform_tolerance: 0.2

      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 0.3

      allow_reversing: false
      use_velocity_scaled_lookahead_dist: false


bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom


behavior_server:
  ros__parameters:
    use_sim_time: false


waypoint_follower:
  ros__parameters:
    use_sim_time: false


local_costmap:
  local_costmap:
    ros__parameters:
      global_frame: odom
      robot_base_frame: base_footprint
      use_sim_time: false

      update_frequency: 8.0
      publish_frequency: 4.0

      rolling_window: true
      width: 10
      height: 10
      resolution: 0.05

      robot_radius: 0.43
      footprint_padding: 0.06

      plugins:
        - obstacle_layer
        - inflation_layer

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        observation_persistence: 0.2

        scan:
          topic: /scan
          data_type: "LaserScan"
          clearing: true
          marking: true
          obstacle_max_range: 4.0
          raytrace_max_range: 5.0
          obstacle_min_range: 0.1
          raytrace_min_range: 0.1
          max_obstacle_height: 2.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.40
        cost_scaling_factor: 5.0


global_costmap:
  global_costmap:
    ros__parameters:
      global_frame: map
      robot_base_frame: base_footprint
      use_sim_time: false

      update_frequency: 2.0
      publish_frequency: 1.0

      resolution: 0.05
      robot_radius: 0.40
      footprint_padding: 0.05

      plugins:
        - static_layer
        - inflation_layer

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.40
        cost_scaling_factor: 5.0


lifecycle_manager:
  ros__parameters:
    use_sim_time: false
    autostart: true

    node_names:
      - map_server
      - amcl
      - planner_server
      - controller_server
      - bt_navigator
      - behavior_server
      - waypoint_follower
