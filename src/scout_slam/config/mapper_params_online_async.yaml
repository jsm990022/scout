slam_toolbox:
  ros__parameters:

    scan_matching_pose_sub: initialpose

    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan

    use_map_as_odom: false

    mode: mapping

    map_update_interval: 0.2

    map_resolution: 0.05

    max_laser_range: 20.0

    minimum_time_interval: 0.06

    transform_publish_period: 0.02

    minimum_score: 0.35

    srr: 0.1
    srt: 0.2

    do_loop_closing: true
    loop_search_maximum_distance: 2.5
    loop_match_minimum_chain_size: 10

    minimum_travel_distance: 0.05

    minimum_travel_heading: 0.2
